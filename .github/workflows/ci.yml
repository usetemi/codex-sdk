name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typescript:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npm run typescript:static
      - run: npm --workspace @usetemi/codex-sdk test

  codex-openai-proxy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npm run proxy:static
      - run: npm run proxy:test
      - run: npm --workspace @usetemi/codex-openai-proxy run build
      - run: docker build -f apps/codex-openai-proxy/Dockerfile -t codex-openai-proxy:ci .
      - name: Docker auth smoke
        run: |
          set -euo pipefail

          docker run --rm codex-openai-proxy:ci test -s /etc/ssl/certs/ca-certificates.crt

          temp_dir="$(mktemp -d)"
          trap 'docker rm -f codex-openai-proxy-smoke >/dev/null 2>&1 || true; rm -rf "${temp_dir}"' EXIT

          cat > "${temp_dir}/fake-codex" <<'SCRIPT'
          #!/bin/sh
          if [ "$1" = "login" ] && [ "$2" = "status" ]; then
            echo "Not logged in" >&2
            exit 1
          fi

          if [ "$1" = "login" ] && [ "$2" = "--device-auth" ]; then
            echo "Open https://auth.openai.com/codex/device"
            echo "Enter ABCD-EFGH"
            echo "expires in 15 minutes"
            exit 0
          fi

          echo "unexpected fake codex args: $*" >&2
          exit 2
          SCRIPT
          chmod +x "${temp_dir}/fake-codex"

          docker run -d --name codex-openai-proxy-smoke \
            -p 127.0.0.1:18080:8080 \
            -e CODEX_OPENAI_PROXY_API_KEYS=proxy-token \
            -e CODEX_OPENAI_PROXY_CODEX_COMMAND=/fake-bin/fake-codex \
            -v "${temp_dir}:/fake-bin:ro" \
            codex-openai-proxy:ci

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:18080/healthz >/tmp/proxy-healthz.json; then
              break
            fi
            sleep 1
          done
          test -s /tmp/proxy-healthz.json

          curl -fsS \
            -H "Authorization: Bearer proxy-token" \
            http://127.0.0.1:18080/auth/status \
            >/tmp/proxy-auth-status.json
          node -e "const fs=require('node:fs'); const body=JSON.parse(fs.readFileSync('/tmp/proxy-auth-status.json','utf8')); if (body.authenticated !== false || body.credential_source !== 'managed_codex_home') process.exit(1);"

          curl -fsS -X POST \
            -H "Authorization: Bearer proxy-token" \
            http://127.0.0.1:18080/auth/device \
            >/tmp/proxy-auth-device.json
          node -e "const fs=require('node:fs'); const body=JSON.parse(fs.readFileSync('/tmp/proxy-auth-device.json','utf8')); if (body.status !== 'pending' || body.user_code !== 'ABCD-EFGH') process.exit(1);"

  openai-compat:
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: pinned
            node-openai-version: "6.38.0"
            python-openai-version: "2.37.0"
            go-openai-version: "v3.36.0"
            allow_failure: false
          - label: latest
            node-openai-version: latest
            python-openai-version: latest
            go-openai-version: latest
            allow_failure: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - uses: astral-sh/setup-uv@v6
      - run: mix local.hex --force
      - run: mix local.rebar --force
      - run: npm install
      - run: npm run openai-compat:sdk
        env:
          OPENAI_COMPAT_NODE_VERSION: ${{ matrix.node-openai-version }}
          OPENAI_COMPAT_PYTHON_VERSION: ${{ matrix.python-openai-version }}
          OPENAI_COMPAT_GO_VERSION: ${{ matrix.go-openai-version }}
      - if: matrix.label == 'pinned'
        run: npm run openai-compat:openapi

  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: npm run release:test
      - run: npm run python:static
      - run: npm run python:test

  elixir:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - run: mix deps.get
        working-directory: packages/elixir
      - run: mix static
        working-directory: packages/elixir
      - run: mix test
        working-directory: packages/elixir

  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod
      - run: npm run go:static
      - run: npm run go:test

  codex-version-matrix:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - id: versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          versions=$(
            {
              printf 'latest\n'
              python scripts/codex_versions.py | sed 's/^rust-v//'
            } | awk '!seen[$0]++' | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )
          echo "versions=${versions}" >> "${GITHUB_OUTPUT}"

  codex-schema-smoke:
    needs: codex-version-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        codex-version: ${{ fromJson(needs.codex-version-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ "${{ matrix.codex-version }}" = "latest" ]; then
            npm install -g @openai/codex@latest
          else
            npm install -g "@openai/codex@${{ matrix.codex-version }}"
          fi
      - run: codex --version
      - run: codex app-server generate-json-schema --out /tmp/codex-schema
      - run: codex app-server generate-ts --out /tmp/codex-ts --experimental
